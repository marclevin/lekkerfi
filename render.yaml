services:
  - type: web
    name: lekkerfi-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: lekkerfi-db
          property: connectionString
      - key: FRONTEND_ORIGIN
        value: https://lekkerfi-web.onrender.com
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FLASK_SECRET_KEY
        generateValue: true

  - type: static
    name: lekkerfi-web
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://lekkerfi-api.onrender.com/api

databases:
  - name: lekkerfi-db
    databaseName: lekkerfi
    user: lekkerfi
    plan: free
